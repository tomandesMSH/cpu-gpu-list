let currentCategory = 'cpu_intel';
let expanded = null;

function setCategory(cat, btn) {
  currentCategory = cat;
  expanded = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('search-input').value = '';
  render();
}

function filterCards(query) {
  render(query);
}

function toggle(idx) {
  expanded = expanded === idx ? null : idx;
  render(document.getElementById('search-input').value);
}

function render(query = '') {
  const list = document.getElementById('gen-list');
  const items = data[currentCategory];
  const q = query.toLowerCase();
  const filtered = items.filter(d =>
    !q || d.name.toLowerCase().includes(q) || d.tech.some(t => t.toLowerCase().includes(q)) || d.tagline.toLowerCase().includes(q)
  );
  const badgeClass = currentCategory.includes('intel') ? 'intel-badge' : currentCategory.includes('nvidia') ? 'nvidia-badge' : 'amd-badge';

  list.innerHTML = filtered.map((d) => {
    const realIdx = items.indexOf(d);
    const isExp = expanded === realIdx;
    return `<div class="gen-card${isExp ? ' expanded' : ''}" onclick="toggle(${realIdx})">
      <div class="gen-header">
        <span class="gen-badge ${badgeClass}">${d.badge}</span>
        <span class="gen-name">${d.name}</span>
        <span class="gen-year">${d.year}</span>
        <span class="gen-node">${d.node}</span>
        <span class="arrow">&#9658;</span>
      </div>
      <div class="gen-tagline">${d.tagline}</div>
      ${isExp ? `<div class="gen-detail">
        <div class="detail-grid">
          <div class="detail-item"><div class="detail-label">IPC / výkon</div><div class="detail-val">${d.ipc}</div></div>
          <div class="detail-item"><div class="detail-label">TDP</div><div class="detail-val">${d.tdp}</div></div>
          <div class="detail-item"><div class="detail-label">Jádra / jednotky</div><div class="detail-val">${d.cores}</div></div>
          <div class="detail-item"><div class="detail-label">Výrobní uzel</div><div class="detail-val">${d.node}</div></div>
        </div>
        <div class="innovations">
          <div class="innovations-label">Co tato generace přinesla</div>
          <ul>${d.innovations.map(i => `<li>${i}</li>`).join('')}</ul>
        </div>
        <div class="tech-tags">${d.tech.map(t => `<span class="tech-tag">${t}</span>`).join('')}</div>
      </div>` : ''}
    </div>`;
  }).join('');
}

render();
</script>

</body>
</html>
